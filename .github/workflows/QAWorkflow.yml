name: QA Workflow

on:
  workflow_dispatch:
  pull_request:
    branches:
      - release
    types: [synchronize, opened, reopened, ready_for_review]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_DB: dhl_test_db
          POSTGRES_USER: dhl_user
          POSTGRES_PASSWORD: dhl_pass
          POSTGRES_HOST: localhost
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dhl_user"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: doxygen gcovr lcov cppcheck graphviz clang-format valgrind bc
          version: 1.0

      - name: Build project
        uses: ./.github/actions/building

      - name: Run style check
        uses: ./.github/actions/style

      - name: Run documentation check
        uses: ./.github/actions/documentation

      - name: Run tests and coverage
        uses: ./.github/actions/coverage_and_test