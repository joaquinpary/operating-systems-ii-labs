name: QA Workflow

on:
  workflow_dispatch:
  pull_request:
    branches:
      - release
    types: [synchronize, opened, reopened, ready_for_review]

jobs:
  build:
    runs-on: ubuntu-24.04

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: dhl_db
          POSTGRES_USER: dhl_user
          POSTGRES_PASSWORD: dhl_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen gcovr lcov cppcheck graphviz clang-format valgrind bc cmake build-essential libpq-dev pkg-config

      - name: Build project
        uses: ./.github/actions/building

      - name: Run style check
        uses: ./.github/actions/style

      - name: Run documentation check
        uses: ./.github/actions/documentation

      - name: Run tests and coverage
        uses: ./.github/actions/coverage_and_test
