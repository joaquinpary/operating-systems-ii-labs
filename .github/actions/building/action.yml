name: "Build"
description: "Executes a compilation."

runs:
  using: "composite"
  steps:
    - name: Set up paths
      shell: bash
      run: |
        echo "LOCAL_INSTALL=$GITHUB_WORKSPACE/local" >> $GITHUB_ENV

    - name: Install libpqxx
      shell: bash
      run: |
        git clone --depth 1 https://github.com/jtv/libpqxx.git /tmp/libpqxx
        cd /tmp/libpqxx
        mkdir build && cd build
        cmake .. \
          -DCMAKE_INSTALL_PREFIX=$LOCAL_INSTALL \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_CXX_STANDARD=20
        make -j$(nproc)
        make install

    - name: Compile
      shell: bash
      run: |
      
        mkdir -p build && cd build
        cmake .. -DBUILD_TARGET=client && make
        cmake .. -DRUN_COVERAGE=1 -DTEST_TARGET=client && make

        cmake .. -DBUILD_TARGET=server -DCMAKE_PREFIX_PATH=$LOCAL_INSTALL && make
        # cmake .. -DRUN_COVERAGE=1 -DTEST_TARGET=server && make
