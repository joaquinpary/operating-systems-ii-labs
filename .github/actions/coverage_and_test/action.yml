name: "Test and coverage check"
description: "Test and coverage check with gcovr, pass if coverage is greater than 90%"

runs:
  using: "composite"
  steps:
    - name: "Run coverage"
      shell: bash
      run: |
        PROJECT_PATH=$(pwd)

        # Run Test
        ctest --test-dir build/tests --output-on-failure

        # Run Coverage with gcovr

        gcovr -r "$PROJECT_PATH" \
          --exclude 'external/*' \
          --exclude 'tests/*' \
          --exclude 'local/*' \
          --exclude 'include/*' \
          > "$PROJECT_PATH/coverage.txt"

        echo "Runnig: gcovr -r $PROJECT_PATH ."

        cat $PROJECT_PATH/coverage.txt

        # Find the value of correct coverage
        COVERAGE_RESULT=$(grep "TOTAL" $PROJECT_PATH/coverage.txt | awk '{print $NF}' | cut -d '%' -f 1)

        # Coverage lines GT 50
        if [ "$(echo "$COVERAGE_RESULT > 50" | bc)" -eq 1 ]; then
            echo "Coverage is greater than 50%. Nice!"
            exit 0
        else
            echo "Error: Coverage is less than or equal to 50%"
            exit 1
        fi

    # Upload errors as an artifact, when failed
    - uses: actions/upload-artifact@v3
      if: failure()
      with:
        name: Tests or coverage errors!!!
        path: $(pwd)/error_flag.txt
        retention-days: 1