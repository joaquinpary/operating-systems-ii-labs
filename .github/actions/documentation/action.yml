name: "Doc check"
description: "Code documentation generation with Doxygen"

runs:
  using: "composite"
  steps:
    - name: "Run doxygen command"
      shell: bash
      run: |
          # We only make check, not changes
          DOX_CONF_FILE=$(pwd)/Doxyfile
          PROJECT_PATH=$(pwd)

          # Modify Doxyfile to include source directories
          {
              cat $DOX_CONF_FILE
              echo "INPUT = $PROJECT_PATH/src $PROJECT_PATH/include"
          } > $DOX_CONF_FILE.tmp
          mv $DOX_CONF_FILE.tmp $DOX_CONF_FILE

          # Generate documentation
          sudo dot -c

          ERROR_FILE_FLAG=$PROJECT_PATH/dox_errors.txt

          # Run doxygen and capture both stdout and stderr
          doxygen $DOX_CONF_FILE > $ERROR_FILE_FLAG 2>&1
          DOXYGEN_EXIT_CODE=$?

          # Show the output
          cat $ERROR_FILE_FLAG

          # Check if doxygen itself failed (non-zero exit code)
          if [ $DOXYGEN_EXIT_CODE -ne 0 ]; then
              echo "Error: Doxygen failed with exit code $DOXYGEN_EXIT_CODE"
              exit 1
          fi

          # Check for actual errors (not just warnings)
          if grep -q "error:" $ERROR_FILE_FLAG; then
              echo "Error: There are documentation errors"
              exit 1
          fi

          echo "Documentation generated successfully!"
          exit 0
    # Upload errors as an artifact, when failed
    - uses: actions/upload-artifact@v3
      if: failure()
      with:
        name: Doxygen errors!!!
        path: dox_errors.txt
        retention-days: 1
