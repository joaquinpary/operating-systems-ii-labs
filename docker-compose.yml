services:
  db:
    image: postgres:15
    container_name: dhl_db
    restart: always
    environment:
      POSTGRES_DB: dhl_db
      POSTGRES_USER: dhl_user
      POSTGRES_PASSWORD: dhl_pass
    ports:
      - "5434:5432"
    networks:
      - dhl_net
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dhl_user -d dhl_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_TARGET: server
    container_name: dhl_server
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: dhl_db
      POSTGRES_USER: dhl_user
      POSTGRES_PASSWORD: dhl_pass
      CONFIG_PATH: /etc/server/config.json
      LOG_DIR: /var/log/dhl
    ports:
      - "9999:9999"
    volumes:
      - ./config/server_config.json:/etc/server/config.json
      - ./config/server:/etc/server/clients
      - ./logs/server:/var/log/dhl
    networks:
      - dhl_net
    shm_size: '256m'
    command: ["/app/dhl_server"]

  client:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_TARGET: client
    container_name: dhl_clients
    depends_on:
      - server
    environment:
      - NUM_CLIENTS=${NUM_CLIENTS:-10}
      - CONFIG_BASE_PATH=/etc/client/client_%s.conf
      - LOG_DIR=/var/log/dhl
      - CLIENT_INVENTORY_INTERVAL_MS=${CLIENT_INVENTORY_INTERVAL_MS:-60000}
      - CLIENT_CONSUME_MIN_MS=${CLIENT_CONSUME_MIN_MS:-10000}
      - CLIENT_CONSUME_MAX_MS=${CLIENT_CONSUME_MAX_MS:-30000}
      - CLIENT_CONSUME_MIN_AMOUNT=${CLIENT_CONSUME_MIN_AMOUNT:-1}
      - CLIENT_CONSUME_MAX_AMOUNT=${CLIENT_CONSUME_MAX_AMOUNT:-20}
      - CLIENT_LOW_STOCK_THRESHOLD=${CLIENT_LOW_STOCK_THRESHOLD:-20}
      - CLIENT_CRITICAL_STOCK_THRESHOLD=${CLIENT_CRITICAL_STOCK_THRESHOLD:-5}
      - CLIENT_MAX_STOCK_PER_ITEM=${CLIENT_MAX_STOCK_PER_ITEM:-100}
      - CLIENT_EMERGENCY_INTERVAL_MS=${CLIENT_EMERGENCY_INTERVAL_MS:-30000}
      - CLIENT_ACK_TIMEOUT_MS=${CLIENT_ACK_TIMEOUT_MS:-5000}
      - CLIENT_MAX_RETRIES=${CLIENT_MAX_RETRIES:-3}
      - CLIENT_RESPONSE_DELAY_MIN_MS=${CLIENT_RESPONSE_DELAY_MIN_MS:-50}
      - CLIENT_RESPONSE_DELAY_MAX_MS=${CLIENT_RESPONSE_DELAY_MAX_MS:-500}
    networks:
      - dhl_net
    volumes:
      - ./config/clients:/etc/client/
      - ./scripts:/app/scripts
      - ./logs/clients:/var/log/dhl
    shm_size: '512m'
    command: ["/bin/bash", "/app/scripts/run_n_clients_docker.sh"]

  grafana:
    image: grafana/grafana-oss:11.6.0
    container_name: dhl_grafana
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/dhl_overview.json
    ports:
      - "3000:3000"
    networks:
      - dhl_net
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards

networks:
  dhl_net:
    enable_ipv6: true
    ipam:
      config:
        - subnet: 172.22.0.0/16
        - subnet: fd01::/64

volumes:
  pgdata: