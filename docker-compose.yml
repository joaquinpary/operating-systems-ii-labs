services:
  db:
    image: postgres:15
    container_name: dhl_db
    restart: always
    environment:
      POSTGRES_DB: dhl_db
      POSTGRES_USER: dhl_user
      POSTGRES_PASSWORD: dhl_pass
    ports:
      - "5434:5432"
    networks:
      - dhl_net
    volumes:
      - pgdata:/var/lib/postgresql/data
    command:
      - "postgres"
      - "-c" 
      - "shared_buffers=256MB"
      - "-c"
      - "checkpoint_timeout=15min"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "max_wal_size=1GB"
      - "-c"
      - "wal_buffers=16MB"
      - "-c"
      - "synchronous_commit=off"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dhl_user -d dhl_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7
    container_name: dhl_mongo
    restart: always
    ports:
      - "27017:27017"
    networks:
      - dhl_net
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_TARGET: server
        ENABLE_OPENMP_CIRCUIT: "ON"
        ENABLE_OPENMP_FLOW: "OFF"
    container_name: dhl_server
    depends_on:
      db:
        condition: service_healthy
      mongo:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: dhl_db
      POSTGRES_USER: dhl_user
      POSTGRES_PASSWORD: dhl_pass
      MONGO_URI: mongodb://mongo:27017/?serverSelectionTimeoutMS=1000&connectTimeoutMS=1000
      MONGO_DB: dhl_results
      CONFIG_PATH: /etc/server/config.json
      LOG_DIR: /var/log/dhl
    ports:
      - "9999:9999"
      - "8080:8080"
    volumes:
      - ./config/server_config.json:/etc/server/config.json
      - ./config/server:/etc/server/clients
      - ./logs/server:/var/log/dhl
    networks:
      - dhl_net
    shm_size: '256m'
    command: ["/app/dhl_server"]

  client:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_TARGET: client
    container_name: dhl_clients
    depends_on:
      - server
    environment:
      - NUM_CLIENTS=${NUM_CLIENTS:-10}
      - CONFIG_BASE_PATH=/etc/client/client_%s.conf
      - LOG_DIR=/var/log/dhl
    networks:
      - dhl_net
    volumes:
      - ./config/clients:/etc/client/
      - ./scripts:/app/scripts
      - ./logs/clients:/var/log/dhl
    shm_size: '512m'
    command: ["/bin/bash", "/app/scripts/run_clients.sh"]

  grafana:
    image: grafana/grafana-oss:11.6.0
    container_name: dhl_grafana
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/dhl_overview.json
    ports:
      - "3000:3000"
    networks:
      - dhl_net
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards

networks:
  dhl_net:
    enable_ipv6: true
    ipam:
      config:
        - subnet: 172.22.0.0/16
        - subnet: fd01::/64

volumes:
  pgdata:
  mongodata:
