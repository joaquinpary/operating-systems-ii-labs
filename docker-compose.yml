services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TARGET: server
    container_name: dhl_server
    depends_on:
      - db
    environment:
      TARGET: server
      POSTGRES_HOST: db
      POSTGRES_DB: dhl_db
      POSTGRES_USER: dhl_user
      POSTGRES_PASSWORD: dhl_pass
    networks:
      - dhl_net
    ports:
      - "9999:9999/tcp"
      - "9998:9998/udp"
      - "9997:9997/tcp"
      - "9996:9996/udp"

  client:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TARGET: client
    environment:
      TARGET: client
    stdin_open: true
    tty: true
    container_name: dhl_client
    networks:
      - dhl_net
  db:
    image: postgres:15
    container_name: dhl_db
    restart: always
    environment:
      POSTGRES_DB: dhl_db
      POSTGRES_USER: dhl_user
      POSTGRES_PASSWORD: dhl_pass
    ports:
      - "5432:5432"
    networks:
      - dhl_net
    volumes:
      - pgdata:/var/lib/postgresql/data

  grafana:
    image: grafana/grafana:10.0.0
    container_name: dhl_grafana
    restart: always
    depends_on:
      - db
    ports:
      - "3000:3000"
    networks:
      - dhl_net
    volumes:
      - grafana-storage:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin

networks:
  dhl_net:

volumes:
  pgdata:
  grafana-storage:
  
