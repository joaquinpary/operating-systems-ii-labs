# ── JSON parsing (cJSON) ─────────────────────────────────────────────────────
CONFIG_CJSON_LIB=y

# ── Networking ──────────────────────────────────────────────────────────────
CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_IPV6=n
CONFIG_NET_TCP=y
CONFIG_NET_SOCKETS=y
CONFIG_DNS_RESOLVER=y
CONFIG_MQTT_LIB=y
CONFIG_NET_CONNECTION_MANAGER=y

# ── Console / log ────────────────────────────────────────────────────────────
CONFIG_POSIX_API=y
CONFIG_PRINTK=y
CONFIG_STDOUT_CONSOLE=y
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

CONFIG_NET_HOSTNAME_ENABLE=y
CONFIG_NET_HOSTNAME="dhl-courier"

# ── Stack / heap ─────────────────────────────────────────────────────────────
CONFIG_MAIN_STACK_SIZE=6144
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
CONFIG_HEAP_MEM_POOL_SIZE=65536

# ── Network buffers ──────────────────────────────────────────────────────────
CONFIG_NET_PKT_RX_COUNT=16
CONFIG_NET_PKT_TX_COUNT=16
CONFIG_NET_BUF_RX_COUNT=32
CONFIG_NET_BUF_TX_COUNT=32

# ── Entropy / random walk telemetry ─────────────────────────────────────────
CONFIG_ENTROPY_GENERATOR=y

# ── Settings (NVS) – used by provisioning module ─────────────────────────────
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y
CONFIG_NVS=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FLASH_PAGE_LAYOUT=y

# ── Wi-Fi compile-time credentials (leave empty to use the captive portal) ───
# Set your real SSID and PSK here to bypass the portal entirely:
CONFIG_DHL_WIFI_SSID="Personal-193"
CONFIG_DHL_WIFI_PSK="tercerob141"
CONFIG_DHL_EMPLOYEE_ID="courier-001"

CONFIG_DHL_MQTT_BROKER_HOSTNAME="192.168.1.3"
CONFIG_DHL_MQTT_BROKER_PORT=1883