# ── Wi-Fi (station + AP mode) ───────────────────────────────────────────────
CONFIG_WIFI=y
CONFIG_NET_L2_WIFI_MGMT=y

CONFIG_NET_DHCPV4=y
CONFIG_NET_DHCPV4_SERVER=y
CONFIG_NET_HOSTNAME="dhl-courier-esp32"

# ── Reboot support (used on provisioning reset) ───────────────────────────────
CONFIG_REBOOT=y