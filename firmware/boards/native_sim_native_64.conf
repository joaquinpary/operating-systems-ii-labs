# ── native_sim networking: offloaded sockets (no TAP, no root required) ─────
# Uses the host's BSD socket stack directly so that 127.0.0.1 resolves to
# the host's loopback (e.g. the dhl_mosquitto Docker container).

# Enable the net drivers menuconfig (required parent for offloaded sockets).
CONFIG_NET_DRIVERS=y

# Enable offloaded sockets – delegates to the host kernel network stack.
CONFIG_NET_SOCKETS_OFFLOAD=y
CONFIG_NET_NATIVE_OFFLOADED_SOCKETS=y

# Connectivity simulation: bring the "interface" up automatically so the
# firmware doesn't wait for a real link event.
CONFIG_NET_NATIVE_OFFLOADED_SOCKETS_CONNECTIVITY_SIM=y
CONFIG_NET_NATIVE_OFFLOADED_SOCKETS_CONNECTIVITY_SIM_AUTO_CONNECT=y
